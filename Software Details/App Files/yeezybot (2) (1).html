<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>イージーボット [YEEZYBOT]</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #000;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr;
    height: 100vh;
    border: 3px solid #fff;
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    border-right: 3px solid #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .title-block {
    border-bottom: 3px solid #fff;
    padding: 16px 20px;
    text-align: center;
  }

  .title-jp {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.08em;
    line-height: 1.2;
  }

  .title-en {
    font-family: 'Bebas Neue', monospace;
    font-size: 16px;
    letter-spacing: 0.2em;
    color: #fff;
    margin-top: 2px;
  }

  .robot-frame {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    border-bottom: 3px solid #fff;
    margin: 16px;
    border: 3px solid #fff;
  }

  .robot-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    filter: grayscale(100%) contrast(1.1);
    mix-blend-mode: lighten;
  }

  .scan-btn {
    border: none;
    border-top: 3px solid #fff;
    border-bottom: 3px solid #fff;
    background: #000;
    color: #fff;
    font-family: 'Bebas Neue', monospace;
    font-size: 22px;
    letter-spacing: 0.15em;
    padding: 16px 24px;
    cursor: pointer;
    width: 100%;
    text-align: center;
    transition: background 0.15s, color 0.15s;
    margin: 12px 0;
  }

  .scan-btn:hover { background: #fff; color: #000; }
  .scan-btn.scanning { background: #fff; color: #000; animation: scan-pulse 0.8s steps(1) infinite; }
  @keyframes scan-pulse { 50% { background: #000; color: #fff; } }

  .connect-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 8px 12px 12px;
  }

  .btn-action {
    border: 3px solid #fff;
    background: #000;
    color: #fff;
    font-family: 'Bebas Neue', monospace;
    font-size: 18px;
    letter-spacing: 0.15em;
    padding: 14px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-align: center;
  }

  .btn-action:hover:not(:disabled) { background: #fff; color: #000; }
  .btn-action:active:not(:disabled) { background: #ddd; color: #000; }
  .btn-action:disabled { color: #333; border-color: #333; cursor: not-allowed; }

  /* ── CENTER PANEL ── */
  .panel-center {
    border-right: 3px solid #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .col-header {
    font-family: 'Bebas Neue', monospace;
    font-size: 22px;
    letter-spacing: 0.15em;
    padding: 20px 20px 16px;
    text-align: center;
    border-bottom: 3px solid #fff;
    line-height: 1.2;
  }

  .device-selected-box {
    border: 3px solid #fff;
    margin: 16px;
    padding: 16px 20px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .device-selected-name {
    font-family: 'Bebas Neue', monospace;
    font-size: 20px;
    color: #fff;
    letter-spacing: 0.1em;
    text-align: center;
  }

  .device-list-scroll {
    flex: 1;
    overflow-y: auto;
    border: 3px solid #fff;
    margin: 0 16px 16px;
    padding: 8px 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .device-list-inner {
    width: 100%;
  }

  .device-list-scroll::-webkit-scrollbar { width: 3px; }
  .device-list-scroll::-webkit-scrollbar-thumb { background: #333; }

  .device-item {
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-left: 3px solid transparent;
  }

  .device-item:hover { background: #111; border-left-color: #fff; }
  .device-item.selected { background: #111; border-left-color: #fff; }

  .device-item-name { font-size: 15px; letter-spacing: 0.05em; }
  .device-item-tag { font-size: 11px; color: #444; letter-spacing: 0.08em; }

  .device-empty {
    font-family: 'Bebas Neue', monospace;
    font-size: 20px;
    color: #333;
    letter-spacing: 0.15em;
    text-align: center;
    padding: 24px 20px;
  }

  /* ── RIGHT PANEL ── */
  .panel-right {
    display: flex;
    flex-direction: column;
  }

  .fn-grid {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .btn-fn {
    border: none;
    border-bottom: 3px solid #fff;
    background: #000;
    color: #fff;
    font-family: 'Bebas Neue', monospace;
    font-size: 26px;
    letter-spacing: 0.1em;
    cursor: pointer;
    position: relative;
    text-align: center;
    padding: 0 20px;
    transition: background 0.12s, color 0.12s;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-fn:last-child { border-bottom: none; }
  .btn-fn:hover:not(:disabled) { background: #fff; color: #000; }
  .btn-fn:active:not(:disabled) { background: #ddd; }
  .btn-fn:disabled { color: #222; cursor: not-allowed; }

  .flash-line {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 3px;
    background: #fff;
    opacity: 0;
  }

  .flash-line.flash { animation: flash-in 0.3s ease-out forwards; }
  @keyframes flash-in { 0% { opacity: 1; } 100% { opacity: 0; } }

  /* BLE unsupported */
  .ble-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
    border: 3px solid #fff;
  }

  .ble-overlay h1 {
    font-family: 'Bebas Neue', monospace;
    font-size: 42px;
    letter-spacing: 0.1em;
  }

  .ble-overlay p {
    font-size: 13px;
    color: #888;
    max-width: 400px;
    text-align: center;
    line-height: 1.7;
    letter-spacing: 0.04em;
  }

  .ble-overlay a { color: #fff; text-decoration: underline; }
</style>
</head>

  </div>
  <button class="scan-btn" id="btnScan" onclick="startScan()">START SCANNING</button>
  <div class="connect-row">
    <button class="btn-action" id="btnConnect" onclick="connectDevice()" disabled>CONNECT</button>
    <button class="btn-action" id="btnDisconnect" onclick="disconnectDevice()" disabled>DISCONNECT</button>
  </div>
</div>

<!-- CENTER PANEL -->
<div class="panel-center">
  <div class="col-header">LIST OF<br>DEVICES</div>
  <div class="device-selected-box">
    <div class="device-selected-name" id="selectedDeviceName">SELECTED DEVICE</div>
  </div>
  <div class="device-list-scroll" id="deviceList">
    <div class="device-empty" id="emptyMsg">AVAILABLE<br>DEVICES</div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="panel-right">
  <div class="col-header">FUNCTIONS<br>TO CALL</div>
  <div class="fn-grid">
    <button class="btn-fn" id="btnCobraKai" onclick="cobrakai()" disabled>
      COBRAKAI
      <div class="flash-line"></div>
    </button>
    <button class="btn-fn" id="btnDance" onclick="dance()" disabled>
      DANCE
      <div class="flash-line"></div>
    </button>
    <button class="btn-fn" id="btnWave" onclick="wave()" disabled>
      WAVE
      <div class="flash-line"></div>
    </button>
    <button class="btn-fn" id="btnBob" onclick="bob()" disabled>
      BOB
      <div class="flash-line"></div>
    </button>
  </div>
</div>

<script>
const NUS_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const NUS_TX_CHAR = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const NUS_RX_CHAR = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let bleDevice = null, txChar = null, rxChar = null, isConnected = false;
const $ = id => document.getElementById(id);

function setFnButtons(en) {
  ['btnCobraKai','btnDance','btnWave','btnBob'].forEach(id => $(id).disabled = !en);
}

async function startScan() {
  if (!navigator.bluetooth) return;
  const btn = $('btnScan');
  btn.classList.add('scanning');
  btn.textContent = 'SCANNING...';
  clearList();
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [NUS_SERVICE] }],
      optionalServices: [NUS_SERVICE]
    });
    addDevice(device.name || 'Unknown Device', device);
    btn.classList.remove('scanning');
    btn.textContent = 'START SCANNING';
  } catch(e) {
    btn.classList.remove('scanning');
    btn.textContent = 'START SCANNING';
  }
}

function clearList() {
  $('deviceList').innerHTML = '<div class="device-empty">SCANNING...</div>';
  $('selectedDeviceName').textContent = 'SELECTED DEVICE';
  $('btnConnect').disabled = true;
  bleDevice = null;
}

function addDevice(name, device) {
  $('deviceList').innerHTML = '';
  const inner = document.createElement('div');
  inner.className = 'device-list-inner';
  const el = document.createElement('div');
  el.className = 'device-item';
  el.innerHTML = '<span class="device-item-name">' + esc(name) + '</span><span class="device-item-tag">BLE</span>';
  el.onclick = () => selectDevice(el, name, device);
  inner.appendChild(el);
  $('deviceList').appendChild(inner);
  selectDevice(el, name, device);
}

function selectDevice(el, name, device) {
  document.querySelectorAll('.device-item').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  bleDevice = device;
  $('selectedDeviceName').textContent = name;
  $('btnConnect').disabled = false;
}

async function connectDevice() {
  if (!bleDevice) return;
  $('btnConnect').disabled = true;
  try {
    const server = await bleDevice.gatt.connect();
    const svc = await server.getPrimaryService(NUS_SERVICE);
    txChar = await svc.getCharacteristic(NUS_TX_CHAR);
    try {
      rxChar = await svc.getCharacteristic(NUS_RX_CHAR);
      await rxChar.startNotifications();
      rxChar.addEventListener('characteristicvaluechanged', onData);
    } catch(_) {}
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
    isConnected = true;
    $('btnDisconnect').disabled = false;
    setFnButtons(true);
  } catch(e) {
    $('btnConnect').disabled = false;
  }
}

function disconnectDevice() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
  onDisconnected();
}

function onDisconnected() {
  isConnected = false; txChar = null; rxChar = null;
  $('btnConnect').disabled = false;
  $('btnDisconnect').disabled = true;
  setFnButtons(false);
}

function onData(e) {
  const text = new TextDecoder('utf-8').decode(e.target.value);
  console.log('Received:', text);
}

async function sendCode(code, btnEl) {
  if (!isConnected || !txChar) return;
  const flash = btnEl.querySelector('.flash-line');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');
  try {
    await txChar.writeValueWithResponse(new Uint8Array([code]));
  } catch(e) {}
}

function cobrakai() { sendCode(1, $('btnCobraKai')); }
function dance()    { sendCode(2, $('btnDance')); }
function wave()     { sendCode(3, $('btnWave')); }
function bob()      { sendCode(4, $('btnBob')); }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

if (!navigator.bluetooth) {
  const ov = document.createElement('div');
  ov.className = 'ble-overlay';
  ov.innerHTML = '<h1>BLUETOOTH UNAVAILABLE</h1><p>Web Bluetooth requires Chrome or Edge. On iPad, use <a href="https://apps.apple.com/app/bluefy/id1492822055" target="_blank">Bluefy</a> from the App Store — it adds Web Bluetooth support to iOS.</p>';
  document.body.appendChild(ov);
}
</script>
</body>
</html>
